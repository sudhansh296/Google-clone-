<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google-Clone</title>
    <style>
        body{
            height: 150vh;
            background-color: rgb(80, 78, 78);
        }
        .header{
            display:flex;
            justify-content: end;
            flex: 1;
            

        }
        .header-img{
            display: flex;
            width: 300px;
            flex-direction: row;
            justify-content: space-between;
            align-items: center;
            color: white;
        }
        .flask-image{
            width: 40px;
            
        } 
        .google-app-image{
            width: 32px;
    
        }
        .sudhanshu-image{
            width: 40px;
            border-radius: 50%;

        }

        .google-image{
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 50px;
            margin-bottom: 30px;
        }
        .google{
             background-color:  rgb(40, 40, 40);
             padding-top: 20px;
             border-radius: 20px;
        }
        .input{
            display: flex;
            flex: 1;
            border-radius: none;
            height: 40px;
            background-color: transparent;
            border-color: white;
            border: none;
            
        }

        .input:focus{
            outline: none;
        }
        .input::placeholder{
            color: black;
            font-family: Arial, Helvetica, sans-serif;
            font-size: 15px;
        }

        .search{
            display: flex;
            width: 25px;
            margin-left: 20px;
            margin-right: 10px;
        }
        .microphone{
            width: 20px;
        
        }
        .ai-mode{
            display: flex;
            align-items: center;
            color: white;
            margin-right: 15px;
            background-color: transparent;
        }
        .search-box{
            background-color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: solid 1px white;
            border-radius: 30px;
            width: 700px;
        }
        .search-box-main{
            display: flex;
            justify-content: center;
            margin-bottom: 40px;
        }
        .microphone-button{
            display: flex;
            width: 30px;
            margin-left: 10px;
            background-color: transparent;
            border: none;
        }
        .search-bar-button{
            display: flex;
            width: 10px;
            margin-left: 7px;
            background-color: transparent;
            border: none;
        }
        .ai-mode-button{
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: transparent;
            border: none;
            margin-left: 20px;
        }
        .ai-mode-image{
            width: 20px;
        }
        .search-bar-right{
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .images-button{
            width:112px;
            height: 112px;
            background-color: transparent;
            border: none;
            color: white;
        }

        .middle-section{
            display: flex;
            padding: 2px;
            justify-content: center;
            align-items: center;
            
        }

        .middle-section-container{
            display: block;

        }
        .images{
            display: flex;
            align-items: center;
            justify-content: end;
        }
        

        .youtube{
            display: flex;
            justify-content: center;
            align-items: center;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background-color: rgb(68, 71, 70);
            margin-bottom: 10px;
            margin-left: 22px;
                
        }
        .continue{
            color: white;
            padding-left: 20px;
            padding-top: 10px;
            
        }

        .details{
            display: block;
            height: 480px;
            width: 800px;
            background-color: rgb(40, 40, 40);
            border-radius: 10px;
        }
        .more-details{
            display: flex;
            height: 70px;
            padding-left: 15px;
            
        }
        .youtube-details{
            background-color: transparent;
            color: white;
            border:none;
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: center;
        }
        .text{
            flex-direction: row;
            flex: 1;
            display:block;
            margin-left: 20px;
            
        }
        .para{
            text-align: left;
            font-size: 12px;
        }
        .details-color{
            margin-left: 10px;
            margin-right: 10px;
            background-color: rgb(68, 71, 70);
            border-radius: 10px;
        }
        .footer{
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 60px;
            
        }

        .set-image{
            background-color: rgb(40, 40, 40);
            padding: 7px 10px;
            border-radius: 10px;
        }
        .see{
            color: white;
            padding-left: 25px;
            padding-bottom: 20px;
        }
        

        
    </style>
</head>
<body>
    <div class="header">

        <p>Gmail</p>

       </div>
    </div>

</body>
</html>
